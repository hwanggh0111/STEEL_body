<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="STEEL BODY - 운동 기록 & 인바디 관리 앱" />
    <title>STEEL BODY</title>

    <!-- 폰트 프리커넥트 (렌더링 빠르게) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS 프리페치 (외부 API) -->
    <link rel="dns-prefetch" href="https://wger.de" />
    <link rel="dns-prefetch" href="https://api.open-meteo.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff1a1a" />

    <!-- Apple Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="STEEL BODY" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- 테마를 CSS 평가 이전에 적용 (검정/흰색 깜빡임 방지) -->
    <script>
      (function () {
        var t = localStorage.getItem('steelbody_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.backgroundColor = t === 'light' ? '#f0f0f0' : '#0a0a0a';
      })();
    </script>
    <style>
      html, body { background-color: #0a0a0a; }
      html[data-theme="light"], html[data-theme="light"] body { background-color: #f0f0f0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
