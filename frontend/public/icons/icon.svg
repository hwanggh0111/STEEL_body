<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>

  <!-- Dumbbell -->
  <g stroke="#ff6b1a" stroke-width="12" fill="none" stroke-linecap="round">
    <!-- Bar -->
    <line x1="130" y1="200" x2="382" y2="200"/>
    <!-- Left weight plates -->
    <rect x="100" y="160" width="40" height="80" rx="8" fill="#ff6b1a" opacity="0.9"/>
    <rect x="70" y="172" width="30" height="56" rx="6" fill="#ff6b1a" opacity="0.7"/>
    <!-- Right weight plates -->
    <rect x="372" y="160" width="40" height="80" rx="8" fill="#ff6b1a" opacity="0.9"/>
    <rect x="412" y="172" width="30" height="56" rx="6" fill="#ff6b1a" opacity="0.7"/>
  </g>

  <!-- SB Text -->
  <text x="256" y="370" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="bold"
        font-size="120" fill="#ff6b1a" letter-spacing="8">
    SB
  </text>
</svg>
